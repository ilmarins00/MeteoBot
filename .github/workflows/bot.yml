name: MeteoBot - Bot Comandi Telegram

# Polling comandi interattivi Telegram.
# Trigger manuale via API (cronjob.org) ogni 3-5 minuti.
# Il bot ascolta per ~3 minuti poi esce, evitando run concorrenti.
#
# ── Configurazione cronjob.org ─────────────────────────────────────────────
# Method : POST
# URL    : https://api.github.com/repos/ilmarins00/MeteoBot/actions/workflows/bot.yml/dispatches
# Headers:
#   Accept        : application/vnd.github+json
#   Authorization : Bearer <GITHUB_PAT>
#   X-GitHub-Api-Version: 2022-11-28
# Body (JSON):
#   {"ref": "main"}
# Interval: ogni 3-5 minuti
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

concurrency:
  group: bot-comandi
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot polling
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python bot.py

      - name: Salva offset aggiornato
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            cp bot_offset.json /tmp/local_offset.json 2>/dev/null || true
            git reset --hard origin/main
            cp /tmp/local_offset.json bot_offset.json 2>/dev/null || true
            git add bot_offset.json || true
            if git diff --cached --quiet; then
              echo "Nessuna modifica offset"
              exit 0
            fi
            git commit -m "Aggiorna bot offset [skip ci]"
            if git push; then
              echo "Push riuscito (tentativo $attempt)"
              exit 0
            fi
            echo "Push rifiutato, ritento ($attempt/5)..."
            sleep $((attempt * 2))
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}