name: MeteoBot - Previsioni Meteo AI

# Genera previsioni meteo per il giorno successivo usando Open-Meteo + Google Gemini.
# Trigger manuale via API (cronjob.org).
#
# ── Configurazione cronjob.org ─────────────────────────────────────────────
# Method : POST
# URL    : https://api.github.com/repos/ilmarins00/MeteoBot/actions/workflows/previsioni.yml/dispatches
# Headers:
#   Accept        : application/vnd.github+json
#   Authorization : Bearer <GITHUB_PAT>
#   X-GitHub-Api-Version: 2022-11-28
# Body (JSON):
#   {"ref": "main"}
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

concurrency:
  group: previsioni-meteo
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  previsioni:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Genera e invia previsioni
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python previsioni.py
