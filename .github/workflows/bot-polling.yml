name: MeteoBot - Bot Comandi Telegram

# Polling continuo dei comandi Telegram.
# Trigger via cronjob.org ogni 5 minuti.
#
# ── Configurazione cronjob.org ─────────────────────────────────────────────
# Method : POST
# URL    : https://api.github.com/repos/ilmarins00/MeteoBot/actions/workflows/bot-polling.yml/dispatches
# Headers:
#   Accept        : application/vnd.github+json
#   Authorization : Bearer <GITHUB_PAT>
#   X-GitHub-Api-Version: 2022-11-28
# Body (JSON):
#   {"ref": "main"}
# Interval: ogni 5 minuti
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

concurrency:
  group: bot-polling
  cancel-in-progress: true   # un nuovo trigger cancella il precedente

permissions:
  contents: write

jobs:
  bot-listen:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ascolta comandi Telegram (~4 min polling)
        env:
          TUYA_ACCESS_ID: ${{ secrets.TUYA_ACCESS_ID }}
          TUYA_ACCESS_SECRET: ${{ secrets.TUYA_ACCESS_SECRET }}
          TUYA_DEVICE_ID: ${{ secrets.TUYA_DEVICE_ID }}
          TUYA_ENDPOINT: ${{ secrets.TUYA_ENDPOINT }}
          ECOWITT_APPLICATION_KEY: ${{ secrets.ECOWITT_APPLICATION_KEY }}
          ECOWITT_API_KEY: ${{ secrets.ECOWITT_API_KEY }}
          ECOWITT_MAC: ${{ secrets.ECOWITT_MAC }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          python bot_commands.py --poll-duration 240

      - name: Commit offset aggiornato
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            # Salva file locali generati durante l'esecuzione
            cp bot_offset.json /tmp/local_offset.json 2>/dev/null || true
            cp state.json /tmp/local_state.json 2>/dev/null || true
            cp storico_24h.json /tmp/local_storico.json 2>/dev/null || true
            git reset --hard origin/main
            # Ripristina i file locali
            cp /tmp/local_offset.json bot_offset.json 2>/dev/null || true
            cp /tmp/local_state.json state.json 2>/dev/null || true
            cp /tmp/local_storico.json storico_24h.json 2>/dev/null || true
            git add bot_offset.json state.json storico_24h.json 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "Nessuna modifica da committare"
              exit 0
            fi
            git commit -m "Aggiorna stato bot [skip ci]"
            if git push; then
              echo "Push riuscito (tentativo $attempt)"
              exit 0
            fi
            echo "Push rifiutato, ritento ($attempt/5)..."
            sleep $((attempt * 2))
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
