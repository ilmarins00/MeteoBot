name: MeteoBot - Monitor Meteo (Fulmini)

# Workflow per il monitor Fulmini.
# Trigger manuale via API (cronjob.org) — un solo cron per entrambi.
#
# ── Configurazione cronjob.org ─────────────────────────────────────────────
# Method : POST
# URL    : https://api.github.com/repos/ilmarins00/MeteoBot/actions/workflows/monitor-meteo.yml/dispatches
# Headers:
#   Accept        : application/vnd.github+json
#   Authorization : Bearer <GITHUB_PAT>
#   X-GitHub-Api-Version: 2022-11-28
# Body (JSON):
#   {"ref": "main"}
# Interval: ogni 10-15 minuti
# ──────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

concurrency:
  group: monitor-meteo
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-monitors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run monitor meteo unificato
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          python send_monitors.py

      - name: Commit stato aggiornato
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            cp state.json /tmp/local_state.json 2>/dev/null || true
            git reset --hard origin/main
            python3 << 'PYEOF'
          import json, os
          with open('/tmp/local_state.json') as f: local = json.load(f)
          remote = {}
          if os.path.exists('state.json'):
              with open('state.json') as f: remote = json.load(f)
          for s in ['fulmini']:
              if s in local: remote[s] = local[s]
          with open('state.json', 'w') as f: json.dump(remote, f, indent=4, ensure_ascii=False)
          PYEOF
            git add state.json || true
            if git diff --cached --quiet; then
              echo "Nessuna modifica da committare"
              exit 0
            fi
            git commit -m "Aggiorna stato monitor meteo [skip ci]"
            if git push; then
              echo "Push riuscito (tentativo $attempt)"
              exit 0
            fi
            echo "Push rifiutato, ritento ($attempt/5)..."
            sleep $((attempt * 2))
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
